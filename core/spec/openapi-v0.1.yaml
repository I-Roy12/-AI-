openapi: 3.0.3
info:
  title: Health AI Core API
  version: 0.1.0
  description: AI-first core API for health journaling, safety gating, and provider matching.
servers:
  - url: /api/v1
paths:
  /logs/daily:
    post:
      summary: Create daily health log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyLogRequest"
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyLogResponse"
  /insights/daily-summary:
    get:
      summary: Get daily summary
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            type: string
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResponse"
  /insights/trend:
    get:
      summary: Get trend insight
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            type: string
        - in: query
          name: window_days
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 30
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendResponse"
  /match/providers:
    get:
      summary: Get provider recommendations
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderMatchResponse"
  /safety/evaluate:
    post:
      summary: Evaluate safety risk from text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SafetyEvaluateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafetyEvaluateResponse"
components:
  schemas:
    DailyLogRequest:
      type: object
      required:
        - user_id
        - recorded_at
        - symptoms
        - symptom_score
        - mood_score
        - sleep_hours
        - sleep_quality_score
        - medication_status
      properties:
        user_id:
          type: string
        recorded_at:
          type: string
          format: date-time
        symptoms:
          type: array
          items:
            type: string
        symptom_score:
          type: integer
          minimum: 0
          maximum: 10
        mood_score:
          type: integer
          minimum: 0
          maximum: 10
        sleep_hours:
          type: number
          minimum: 0
          maximum: 24
        sleep_quality_score:
          type: integer
          minimum: 0
          maximum: 10
        medication_status:
          type: string
          enum: [taken, missed, none]
        note:
          type: string
    DailyLogResponse:
      type: object
      required: [log_id, status]
      properties:
        log_id:
          type: string
        status:
          type: string
          enum: [accepted]
    SummaryResponse:
      type: object
      required: [summary, confidence, evidence, disclaimer, audit_id]
      properties:
        summary:
          type: string
        confidence:
          $ref: "#/components/schemas/Confidence"
        evidence:
          type: array
          items:
            type: string
        disclaimer:
          type: string
        audit_id:
          type: string
    TrendResponse:
      type: object
      required: [trend, highlights, confidence, evidence, disclaimer, audit_id]
      properties:
        trend:
          type: string
          enum: [improving, stable, worsening]
        highlights:
          type: array
          items:
            type: string
        confidence:
          $ref: "#/components/schemas/Confidence"
        evidence:
          type: array
          items:
            type: string
        disclaimer:
          type: string
        audit_id:
          type: string
    ProviderMatchResponse:
      type: object
      required:
        - category
        - recommended_departments
        - providers
        - confidence
        - evidence
        - disclaimer
        - audit_id
      properties:
        category:
          type: string
        recommended_departments:
          type: array
          items:
            type: string
        providers:
          type: array
          items:
            $ref: "#/components/schemas/Provider"
        confidence:
          $ref: "#/components/schemas/Confidence"
        evidence:
          type: array
          items:
            type: string
        disclaimer:
          type: string
        audit_id:
          type: string
    Provider:
      type: object
      required: [provider_id, name, fit_score, online_available]
      properties:
        provider_id:
          type: string
        name:
          type: string
        fit_score:
          type: number
          minimum: 0
          maximum: 1
        online_available:
          type: boolean
        next_slot:
          type: string
          format: date-time
    SafetyEvaluateRequest:
      type: object
      required: [user_id, text]
      properties:
        user_id:
          type: string
        text:
          type: string
    SafetyEvaluateResponse:
      type: object
      required:
        - risk_level
        - triggered_rules
        - block_normal_response
        - emergency_guidance
        - audit_id
      properties:
        risk_level:
          type: string
          enum: [low, medium, high]
        triggered_rules:
          type: array
          items:
            type: string
        block_normal_response:
          type: boolean
        emergency_guidance:
          type: string
        audit_id:
          type: string
    Confidence:
      type: string
      enum: [low, medium, high]
