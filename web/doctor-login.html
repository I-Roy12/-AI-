<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>体調日記 医師ログイン</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container" style="max-width:560px;">
      <h1>医師ログイン</h1>
      <p class="sub">医師ビューを閲覧するにはログインが必要です。</p>

      <section class="card">
        <form id="doctor-login-form">
          <label>メールアドレス<input id="doctor-email" type="email" value="doctor@example.com" required /></label>
          <label>パスワード<input id="doctor-password" type="password" value="doctor1234" required /></label>
          <div class="review-row">
            <button type="submit" id="doctor-login-btn">ログイン</button>
            <p id="doctor-login-status" class="last-sync">未ログイン</p>
          </div>
        </form>
        <p class="sub">デモ用初期値: doctor@example.com / doctor1234</p>
      </section>
    </main>

    <script src="/doctor-login.js" type="module"></script>
  </body>
</html>
